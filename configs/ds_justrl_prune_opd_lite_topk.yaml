base_config: configs/base_ds_justrl_1p5b.yaml
# Full rollout span, then Prune-OPD-lite reweights token losses by top-k overlap.
strategy: full
full_max_new_tokens: 1024
opd_loss_mode: prune_opd_lite
loss_backend: topk_kl
reverse_top_k: 16
overlap_top_k: 16
prune_overlap_threshold: 0.80
prune_w_drop: 0.01
prune_w_base: 0.5
prune_cumulative: true
prune_base_loss: reverse_kl
kl_renorm_topk: true
output_dir: outputs/ds_r1qwen_1p5b_to_justrl_1p5b_prune_opd_lite_topk_threshold0.80
