base_config: configs/base_ds_justrl_1p5b.yaml
# Token-level Adaptive-KL: each token decides KL direction by its own top-k overlap.
strategy: full
full_max_new_tokens: 1024
opd_loss_mode: adaptive_kl
loss_backend: topk_kl
adaptive_granularity: token
adaptive_low_threshold: 0.0
adaptive_high_threshold: 0.80
adaptive_low_action: downweight
adaptive_low_weight: 0.2
adaptive_medium_weight: 1.0
adaptive_high_weight: 1.0
reverse_top_k: 16
forward_top_k: 64
overlap_top_k: 16
kl_renorm_topk: true
output_dir: outputs/ds_r1qwen_1p5b_to_justrl_1p5b_adaptive_kl_token_topk_threshold0.80
