# Base config for same-tokenizer OPD/ESR/Adaptive-KL math experiments.
# Pair: DeepSeek-R1-Distill-Qwen-1.5B -> JustRL-DeepSeek-1.5B
# Note: `strategy: full` in experiment configs means all rollout response tokens are used for loss.
seed: 42

model_name_or_path: deepseek-ai/DeepSeek-R1-Distill-Qwen-1.5B
teacher_model_name_or_path: hbx/JustRL-DeepSeek-1.5B
trust_remote_code: true
dtype: bfloat16
attn_implementation: sdpa

# Both models are Qwen-style reasoning/chat models. Keep student/teacher formatting consistent.
# If your tokenizer/template throws an error, set both to false for a plain prompt ablation.
student_use_chat_template: true
student_enable_thinking: false
teacher_use_chat_template: true
teacher_enable_thinking: false

dataset_name: open-r1/DAPO-Math-17k-Processed
dataset_split: train
dataset_adapter: math
max_train_examples: 3200
shuffle_dataset: true

system_prompt: "Please reason step by step, and put your final answer within \\boxed{}."
user_prompt_template: "{problem}"

max_length: 4096
max_prompt_length: 2048

full_max_new_tokens: 1024
prefix_length: 100
curriculum_lengths: [50, 100, 200]
curriculum_boundaries: [0, 67, 134]

reflection_rollout_max_tokens: 1024
reflection_chunk_size: 32
reflection_max_new_tokens: 512
reflection_use_reference: true
reflection_parse_failure: esr
reflection_fallback_length: 100
reflection_min_keep_tokens: 0
reflection_log_path: null

correctness_rollout_max_tokens: 1024
correctness_wrong_fallback: esr
answer_extraction: auto

temperature: 0.7
top_p: 1.0
top_k: 0
rollout_do_sample: true

# Same-tokenizer experiments use the patch's top-k KL losses, not cross-tokenizer sampled_rkl.
# This avoids full-vocabulary KL while still approximating forward/reverse KL.
loss_backend: topk_kl
opd_loss_mode: reverse_kl
lmbda: 1.0
beta: 1.0
seq_kd: false
minimum_aligned_chars: 1
rkl_advantage_clip: null

# Top-k KL / overlap defaults.
# forward_top_k is intentionally larger because forward KL is used as support repair.
kd_top_k: 16
reverse_top_k: 16
forward_top_k: 64
overlap_top_k: 16
kl_renorm_topk: true

mixture_forward_alpha: 0.5

prune_overlap_threshold: 0.7
prune_w_drop: 0.01
prune_w_base: 0.5
prune_cumulative: true
prune_base_loss: reverse_kl

adaptive_low_threshold: 0.3
adaptive_high_threshold: 0.7
adaptive_low_action: downweight
adaptive_low_weight: 0.2
adaptive_medium_weight: 1.0
adaptive_high_weight: 1.0
adaptive_granularity: token
adaptive_stage_size: 50

output_dir: outputs/ds_r1qwen_1p5b_to_justrl_1p5b_base
max_steps: 200
learning_rate: 5.0e-5
per_device_train_batch_size: 1
gradient_accumulation_steps: 16
save_steps: 50
logging_steps: 1
warmup_ratio: 0.03
warmup_steps: null
weight_decay: 0.0
lr_scheduler_type: constant
gradient_checkpointing: true
num_workers: 0
report_to: none
save_only_model: true
resume_from_checkpoint: null

use_lora: true
lora_r: 32
lora_alpha: 64
lora_dropout: 0.0
lora_target_modules: all-linear

debug_print_every_step: false
debug_print_samples: 1
debug_print_max_chars: 2500
debug_log_jsonl: debug_steps.jsonl
